{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 50px;">
    <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: var(--shadow);">
        <h2 style="text-align: center; margin-bottom: 30px;">Manage Profile</h2>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                {{ form.full_name }}
            </div>
            <div class="form-group" style="margin-top: 20px;">
                <label>Mobile Number</label>
                {{ form.mobile_number }}
            </div>
            <div class="form-group" style="margin-top: 20px;">
                <label>Email Address (Cannot be changed)</label>
                <input type="text" value="{{ user.email }}" disabled style="background: #f5f5f5; cursor: not-allowed;">
            </div>
            
            <button type="submit" class="btn-block" style="background: var(--primary); margin-top: 30px;">Update Profile</button>
            <a href="{% url 'dashboard_home' %}" style="display: block; text-align: center; margin-top: 15px; text-decoration: none; color: var(--gray);">Back to Dashboard</a>
        </form>
    </div>
</div>

<style>
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 8px; font-size: 1rem; }
    label { font-weight: bold; color: var(--primary); }
</style>
{% endblock %}
