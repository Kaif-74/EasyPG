{% extends 'base.html' %}

{% block content %}
<div class="auth-box">
    <h2 style="text-align: center; margin-bottom: 10px;">Welcome Back</h2>
    <p style="text-align: center; color: var(--gray); margin-bottom: 30px;">Login to manage your PGs</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Email Address</label>
            <input type="text" name="username" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-block">Login to Account</button>
    </form>
    
    <p style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
        New Owner? <a href="{% url 'register' %}" style="color: var(--accent); font-weight: bold; text-decoration: none;">Register here</a>
    </p>
</div>
{% endblock %}
